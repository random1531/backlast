version: "3.8"

services:
  backlast:
    build: .
    image: backlast:latest
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./data:/usr/src/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
