version: "3.8"

services:
  backlast:
    build: .
    image: backlast:latest
    restart: unless-stopped
    # keep port published so you can still access directly if needed
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-http://localhost:3000}
      - JWT_SECRET=${JWT_SECRET}
    # persist sqlite data in a named volume
    volumes:
      - backlast_data:/usr/src/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      # route (replace with your real domain)
      - "traefik.http.routers.backlast.rule=Host(`back.example.com`)"
      - "traefik.http.routers.backlast.entrypoints=websecure"
      - "traefik.http.routers.backlast.tls=true"
      # certresolver name may differ on your Traefik setup; change if needed
      - "traefik.http.routers.backlast.tls.certresolver=leresolver"
      - "traefik.http.services.backlast.loadbalancer.server.port=5000"
    networks:
      - traefik

volumes:
  backlast_data:

networks:
  # assumes Traefik is running on an external network named 'traefik'
  traefik:
    external: true
